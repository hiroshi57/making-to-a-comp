<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — Operations Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #f5f5f7;
    --surface: #ffffff;
    --border:  #e5e5ea;
    --accent:  #5856d6;
    --text:    #1c1c1e;
    --muted:   #8e8e93;
    --up:      #30d158;
    --down:    #ff3b30;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 40px 36px;
    width: 400px;
    max-width: 94vw;
    box-shadow: 0 8px 40px rgba(0,0,0,.08);
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-mark {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #5856d6, #af52de);
    border-radius: 14px;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 12px;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 18px;
    color: var(--accent);
    display: block;
  }

  .logo-sub {
    font-size: 11px; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
    display: block; margin-top: 2px;
  }

  h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 20px;
    margin-bottom: 6px;
  }

  .desc {
    font-size: 12px; color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .form-row { margin-bottom: 14px; }

  label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--muted); margin-bottom: 5px;
    letter-spacing: .08em; text-transform: uppercase;
  }

  input {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: inherit;
    background: #f5f5f7; color: var(--text);
    outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); background: white; }

  .btn {
    width: 100%; padding: 13px;
    background: var(--accent); color: white;
    border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 14px;
    cursor: pointer; margin-top: 8px;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .4; cursor: default; }

  .msg {
    margin-top: 14px; font-size: 12px;
    min-height: 18px; text-align: center;
  }

  .hint {
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
    text-align: center; line-height: 1.7;
  }

  .hint code {
    background: #f5f5f7; padding: 1px 5px;
    border-radius: 4px; font-size: 11px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">🧭</div>
    <span class="logo-name" id="companyName">Operations</span>
    <span class="logo-sub">Dashboard</span>
  </div>

  <h2>ログイン</h2>
  <p class="desc">社員アカウントでサインインしてください。</p>

  <div class="form-row">
    <label>メールアドレス</label>
    <input id="email" type="email" placeholder="ceo@company.jp" autocomplete="username">
  </div>
  <div class="form-row">
    <label>パスワード</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') submitLogin()">
  </div>

  <button class="btn" id="loginBtn" onclick="submitLogin()">サインイン</button>
  <div class="msg" id="msg"></div>

  <div class="hint">
    初回ログインのパスワードは社員ID（例: <code>EMP001</code>）です。<br>
    ログイン後、設定からパスワードを変更できます。
  </div>
</div>

<script>
const API = `${location.protocol}//${location.hostname}:8000`;

// 会社名を設定から取得
fetch(`${API}/api/settings`).then(r => r.json()).then(s => {
  if (s.company_name) document.getElementById('companyName').textContent = s.company_name;
}).catch(() => {});

// すでにトークンがあればダッシュボードへ
const token = localStorage.getItem('auth_token');
if (token) {
  fetch(`${API}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
    .then(r => r.ok ? location.replace('/') : localStorage.removeItem('auth_token'))
    .catch(() => {});
}

async function submitLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const msg      = document.getElementById('msg');

  if (!email || !password) {
    msg.style.color = 'var(--down)';
    msg.textContent = 'メールアドレスとパスワードを入力してください';
    return;
  }

  btn.disabled = true;
  btn.textContent = '認証中...';
  msg.textContent = '';

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'ログイン失敗');
    }

    const data = await res.json();
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user',  JSON.stringify({
      name: data.name, role: data.role, role_ja: data.role_ja, email: data.email
    }));

    msg.style.color = 'var(--up)';
    msg.textContent = `✓ ようこそ、${data.name}さん`;
    setTimeout(() => location.replace('/'), 800);

  } catch(e) {
    msg.style.color = 'var(--down)';
    msg.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'サインイン';
  }
}
</script>
</body>
</html>
